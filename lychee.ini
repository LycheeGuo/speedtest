; --- 策略组设置 ---

; 1. 【基础核心组】
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]DIRECT`.*

; 2. 【功能辅助组】
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`180
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`180

; 3. 【AI 专属组】
; 仅筛选美/新/日/韩/台/英/法节点，并排除香港相关命名
custom_proxy_group=🤖 AI服务`select`(?i)(?!(.*(HK|Hong Kong|HongKong|香港)))(.*(US|SG|JP|KR|TW|GB|FR|美国|新加坡|日本|韩国|台湾|英国|法国).*)`[]🚀 节点选择

; 4. 【拦截与兜底】
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择


; --- 规则集设置 ---

; 0. 【局域网 / 国内直连】
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list

; 1. 【去广告】
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 2. 【会议直连】
ruleset=DIRECT,[]DOMAIN-KEYWORD,zoom
ruleset=DIRECT,[]DOMAIN-SUFFIX,zoom.us
ruleset=DIRECT,[]DOMAIN-SUFFIX,zoom.com

; 3. 【AI 服务】
; --- OpenAI ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,auth0.com

; --- Claude ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,anthropic.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claude.ai
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claude.com

; --- Gemini ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,bard.google.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,generativelanguage.googleapis.com

; 4. 【常见代理网站】
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; 5. 【海外补充代理】
; 不再使用独立组，直接交给 🚀 节点选择
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; 6. 【兜底】
ruleset=🐟 漏网之鱼,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true
