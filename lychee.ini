;不要随意改变关键字，否则会导致出错
; --- 策略组设置 ---

; 1. 【基础核心组】(这里加了 .*，你的所有机场节点都会显示出来了)
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]DIRECT`.*

; 2. 【功能辅助组】(为上面的组提供支持)
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`180
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`180

; 3. 【AI 专属组】(正则筛选：美/日/韩/新/台/英/法，强制剔除香港)
; 专门服务 ChatGPT/Claude/Gemini
custom_proxy_group=🤖 AI服务`select`(US|SG|JP|KR|TW|GB|FR|)`[]🚀 节点选择

; 4. 【拦截与兜底】
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
; 漏网之鱼默认 DIRECT (直连)
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择


; --- 规则集设置 ---

; 1. 【局域网与基础应用直连】(防止本地网络及常用纯直连应用被错误拦截或代理)
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt

; 2. 【去广告】(使用 Loyalsoldier 维护的 reject 广告和追踪列表)
ruleset=🛑 全球拦截,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt

; 3. 【会议直连】(保留你的自定义规则：Zoom 强制走直连，防止卡顿)
ruleset=DIRECT,[]DOMAIN-KEYWORD,zoom
ruleset=DIRECT,[]DOMAIN-SUFFIX,zoom.us
ruleset=DIRECT,[]DOMAIN-SUFFIX,zoom.com

; 4. 【纯 AI 服务】(保留你的自定义规则：手动指定域名 -> 走 AI 组)
; --- OpenAI ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,auth0.com
; --- Claude ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,anthropic.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,claude.ai
; --- Google Gemini (只包含 Gemini 专用域名) ---
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,bard.google.com

; 5. 【全球代理列表】(替换为 Loyalsoldier 规则：TG、代理域名、GFWList及非中国顶级域名)
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=🚀 节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt

; 6. 【国内直连增强】(Apple/iCloud 直连，以及国内域名和大陆 IP 段直连，极大提升国内访问速度)
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
ruleset=DIRECT,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt

; 7. 【兜底直连】
ruleset=🐟 漏网之鱼,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true
