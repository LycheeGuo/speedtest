; --- 策略组设置 ---

; 1. 【基础核心组】
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]DIRECT`.*

; 2. 【自动选择 / 故障转移 / 负载均衡】
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`180
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`180

; 3. 【广告拦截】
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; 4. 【国内 / 可直连】
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择

; 5. 【漏网之鱼】
; 默认走代理，防止墙外网站因为未命中规则而直连失败
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT


; --- 规则集设置 ---

; 1. 【广告拦截】
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list


; 2. 【局域网 / 内网直连】
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,local
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,17.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,100.64.0.0/10,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,224.0.0.0/4,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR6,fe80::/10,no-resolve


; 3. 【国内网站直连】
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list


; 4. 【常见可直连服务】
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list


; 6. 【常见墙外 / 代理网站】
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list


; 7. 【中国 IP 直连】
ruleset=🎯 全球直连,[]GEOIP,CN


; 8. 【最终兜底】
; 默认代理，避免未收录的墙外网站打不开
ruleset=🐟 漏网之鱼,[]FINAL


enable_rule_generator=true
overwrite_original_rules=true
