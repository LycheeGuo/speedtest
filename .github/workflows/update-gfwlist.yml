name: Update GFWList Clash Rules

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gfwlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Create folders
        run: |
          mkdir -p rules
          mkdir -p scripts

      - name: Download GFWList
        run: |
          curl -L "https://cdn.jsdelivr.net/gh/gfwlist/gfwlist@master/gfwlist.txt" -o gfwlist.b64

      - name: Convert GFWList to Clash rule list
        run: |
          python scripts/convert_gfwlist.py gfwlist.b64 rules/gfwlist-clash.list

      - name: Show generated rule count
        run: |
          echo "Generated rules:"
          wc -l rules/gfwlist-clash.list
          head -n 20 rules/gfwlist-clash.list

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/gfwlist-clash.list

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update GFWList Clash rules"
            git push
          fi
